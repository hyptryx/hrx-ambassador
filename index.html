<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRX Ambassador Programm</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header class="hrx-header">
    <h1>HRX Ambassador Programm</h1>
    <p>Wer hat wen zu HRX eingeladen?</p>
  </header>

  <main class="container">

    <!-- FORMULAR -->
    <section class="card">
      <h2>Neue Werbung eintragen</h2>

      <form id="inviteForm">

        <!-- Werber -->
        <div class="form-row">
          <label for="werberSelect">Werber (Ambassador)</label>
          <div class="werber-wrapper">
            <select id="werberSelect" required>
              <option value="">Bitte auswählen...</option>
            </select>

            <button type="button" id="addAmbassadorBtn" class="secondary-btn">
              Ambassador hinzufügen
            </button>
          </div>
        </div>

        <!-- Geworbener -->
        <div class="form-row">
          <label for="geworbenerName">Geworbener</label>
          <input type="text" id="geworbenerName" placeholder="Name des Geworbenen" required />
        </div>

        <!-- Twitch -->
        <div class="form-row">
          <label for="twitchLink">Twitch-Link</label>
          <input type="url" id="twitchLink" placeholder="https://twitch.tv/username" />
        </div>

        <!-- Datum -->
        <div class="form-row">
          <label for="datum">Datum</label>
          <input type="date" id="datum" required />
        </div>

        <!-- Aktivität -->
        <div class="form-row">
          <label for="aktivitaet">Aktivität</label>
          <select id="aktivitaet" required>
            <option value="probezeit">Probezeit</option>
            <option value="aktiv">aktiv</option>
            <option value="sehr_aktiv">sehr aktiv</option>
            <option value="abgelehnt">abgelehnt</option>
          </select>
        </div>

        <!-- Zu-/Absage -->
        <div class="form-row">
          <label for="zusageGesendet">Zu-/Absage gesendet?</label>
          <select id="zusageGesendet" required>
            <option value="nein">nein</option>
            <option value="ja">ja</option>
          </select>
        </div>

        <!-- Mods Aktionen -->
        <div class="form-row">
          <label for="modsAktionen">Mods Aktionen</label>
          <textarea id="modsAktionen" rows="3" placeholder="Wichtige Notizen"></textarea>
        </div>

        <!-- SPEICHERN -->
        <button type="submit" class="primary-btn">Speichern</button>

      </form>
    </section>

    <!-- TABELLE -->
    <section class="card">
      <h2>Alle Einträge</h2>

      <table id="invitesTable">
        <thead>
          <tr>
            <th>Werber</th>
            <th>Geworbener</th>
            <th>Twitch</th>
            <th>Datum</th>
            <th>Aktivität</th>
            <th>Zu-/Absage</th>
            <th>Mods Aktionen</th>
          </tr>
        </thead>
        <tbody>
          <!-- Wird per JS gefüllt -->
        </tbody>
      </table>
    </section>

  </main>

  <!-- Firebase + App Script -->
  <script type="module" src="app.js"></script>

</body>
</html>
